---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu
    image: ubuntu:latest
    privileged: true
    pre_build_image: true

  - name: oraclelinux
    image: oraclelinux:8
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      host_key_checking: false
      timeout: 30
  playbooks:
    converge: converge.yml
    prepare: prepare.yml
    destroy: destroy.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
