---
- name: Prepare
  hosts: all
  gather_facts: false

  tasks:
    - name: Install Python on Ubuntu/Debian
      raw: |
        apt-get update -y && apt-get install -y python3 python3-apt sudo
        apt-get install -y curl tar gzip
      when: "'ubuntu' in inventory_hostname"
      changed_when: false

    - name: Install Python and dependencies on OracleLinux/RedHat
      raw: |
        yum install -y python39 python3-dnf sudo curl tar gzip
        alternatives --set python /usr/bin/python3.9 2>/dev/null || alternatives --set python3 /usr/bin/python3.9 2>/dev/null
      when: "'oraclelinux' in inventory_hostname"
      changed_when: false

    - name: Gather facts after Python installation
      setup: