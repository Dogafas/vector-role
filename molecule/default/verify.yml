- name: Verify Vector installation
  hosts: all
  gather_facts: false

  vars_files:
    - ../../defaults/main.yml

  tasks:
    - name: Check vector binary exists
      stat:
        path: "{{ vector_bin_path }}"
      register: vector_bin

    - name: Assert vector binary exists
      assert:
        that:
          - vector_bin.stat.exists
          - vector_bin.stat.executable
        fail_msg: "Vector binary not found or not executable at {{ vector_bin_path }}"
        success_msg: "Vector binary found and executable at {{ vector_bin_path }}"

    - name: Check vector config exists
      stat:
        path: "{{ vector_config_path }}"
      register: vector_cfg

    - name: Assert vector config exists and not empty
      assert:
        that:
          - vector_cfg.stat.exists
          - vector_cfg.stat.size > 0
        fail_msg: "Vector config missing or empty at {{ vector_config_path }}"
        success_msg: "Vector config exists and is not empty"

    - name: Validate vector config
      command: "{{ vector_bin_path }} validate --config-yaml {{ vector_config_path }}"
      register: vector_validate
      changed_when: false

    - name: Assert vector config is valid
      assert:
        that:
          - vector_validate.rc == 0
          - "'Validated' in vector_validate.stdout or vector_validate.rc == 0"
        fail_msg: "Vector config validation failed: {{ vector_validate.stderr | default(vector_validate.stdout) }}"
        success_msg: "Vector config is valid"

    - name: Check if vector is running
      shell: "pgrep -f '{{ vector_bin_path }}'"
      register: vector_running
      changed_when: false
      failed_when: false

    - name: Start vector if not running
      command: "{{ vector_bin_path }} --config {{ vector_config_path }}"
      async: 3600
      poll: 0
      when: vector_running.rc != 0

    - name: Wait for vector to start
      wait_for:
        timeout: 3
      when: vector_running.rc != 0

    - name: Check vector is running after start attempt
      shell: "pgrep -f '{{ vector_bin_path }}'"
      register: vector_final_check
      changed_when: false
      failed_when: false

    - name: Assert vector is running
      assert:
        that:
          - vector_final_check.rc == 0
          - vector_final_check.stdout | length > 0
        fail_msg: "Vector process is not running"
        success_msg: "Vector process is running with PID: {{ vector_final_check.stdout }}"

    - name: Get vector version
      command: "{{ vector_bin_path }} --version"
      register: vector_version
      changed_when: false
      ignore_errors: true

    - name: Assert vector version is correct
      assert:
        that:
          - vector_version.rc == 0
          - "'vector' in vector_version.stdout"
        fail_msg: "Failed to get vector version or output invalid"
        success_msg: "Vector version OK: {{ vector_version.stdout }}"
