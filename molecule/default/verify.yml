# ---
# # Purpose: assert that the instance really ended up in the expected state.
# # Molecule calls this playbook with `molecule verify`.
# - name: Verify
#   hosts: instance
#   gather_facts: false # Quicker, if you do not need facts
#   tasks:
#     - name: Assert something
#       ansible.builtin.assert:
#         that: true

---
- name: Verify Vector installation
  hosts: all
  gather_facts: false
  tasks:
    - name: Check vector binary exists
      ansible.builtin.stat:
        path: /usr/bin/vector
      register: vector_bin

    - name: Assert vector binary exists
      ansible.builtin.assert:
        that:
          - vector_bin.stat.exists
        fail_msg: "Vector binary not found"
        success_msg: "Vector binary exists"

    - name: Check vector service is running
      ansible.builtin.command: systemctl is-active vector
      register: vector_service
      failed_when: false

    - name: Assert vector service is active
      ansible.builtin.assert:
        that:
          - vector_service.stdout == "active"
        fail_msg: "Vector service is not active"
        success_msg: "Vector service is active"

    - name: Validate vector config
      ansible.builtin.command: vector validate --no-environment
      register: vector_validate
      failed_when: false

    - name: Assert vector config is valid
      ansible.builtin.assert:
        that:
          - vector_validate.rc == 0
        fail_msg: "Vector config is invalid"
        success_msg: "Vector config is valid"
