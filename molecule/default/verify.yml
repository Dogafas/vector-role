# ---
# # Purpose: assert that the instance really ended up in the expected state.
# # Molecule calls this playbook with `molecule verify`.
# - name: Verify
#   hosts: instance
#   gather_facts: false # Quicker, if you do not need facts
#   tasks:
#     - name: Assert something
#       ansible.builtin.assert:
#         that: true

---
- name: Verify Vector installation
  hosts: all
  gather_facts: false
  
  vars_files:
    - ../../defaults/main.yml  # Подключаем переменные из роли
  
  tasks:
    - name: Check vector binary exists
      stat:
        path: "{{ vector_bin_path }}"
      register: vector_bin
    
    - name: Assert vector binary exists
      assert:
        that:
          - vector_bin.stat.exists
        fail_msg: "Vector binary not found at {{ vector_bin_path }}"
        success_msg: "Vector binary found at {{ vector_bin_path }}"
    
    - name: Check if vector is running
      shell: "pgrep -f '{{ vector_bin_path }}' || true"
      register: vector_running
      changed_when: false
    
    - name: Show vector process
      debug:
        msg: "Vector is running with PID: {{ vector_running.stdout }}"
      when: vector_running.stdout != ""
    
    - name: Get vector version
      command: "{{ vector_bin_path }} --version"
      register: vector_version
      changed_when: false
      ignore_errors: true
    
    - name: Show vector version
      debug:
        var: vector_version.stdout
      when: vector_version is success