---
# Создание каталогов для установки и данных Vector
- name: Create extraction directory
  file:
    path: "{{ vector_install_dir }}"
    state: directory
    mode: "0755"

- name: Create Vector data directory
  file:
    path: "{{ vector_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# Скачивание архива Vector
- name: Download Vector archive
  get_url:
    url: "{{ vector_archive_url }}"
    dest: "{{ vector_archive_path }}"
    timeout: 60
    validate_certs: yes
  register: download_result
  retries: 3
  delay: 5
  until: download_result is not failed

# Распаковка архива Vector
- name: Extract Vector archive
  unarchive:
    src: "{{ vector_archive_path }}"
    dest: "{{ vector_install_dir }}"
    remote_src: yes

# Установка бинарника Vector
- name: Move Vector binary to bin
  copy:
    src: "{{ vector_extracted_bin }}"
    dest: "{{ vector_bin_path }}"
    mode: "0755"
    remote_src: true

- name: Ensure vector binary is executable
  file:
    path: "{{ vector_bin_path }}"
    mode: "0755"

# Конфигурация Vector
- name: Create Vector config directory
  file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Vector config
  template:
    src: vector.yml.j2
    dest: "{{ vector_config_path }}"
    mode: "0644"

# Systemd — только вне Molecule
- name: Setup systemd service (for production environments)
  block:
    - name: Create Vector systemd unit
      template:
        src: vector.service.j2
        dest: /etc/systemd/system/vector.service
        mode: "0644"
      notify: Restart vector

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Enable and start Vector
      systemd:
        name: vector
        state: started
        enabled: true
  when: not molecule_test | default(false)
  become: true

# Запуск Vector напрямую в Molecule
- name: Check if Vector is already running
  shell: "pgrep -f '{{ vector_bin_path }}' || true"
  register: vector_pid
  changed_when: false
  when: molecule_test | default(false)

- name: Run Vector directly in test environment (if not running)
  command: "{{ vector_bin_path }} --config {{ vector_config_path }}"
  async: 3600
  poll: 0
  when:
    - molecule_test | default(false)
    - vector_pid.stdout == ""
  changed_when: true

- name: Debug - Show Vector status
  debug:
    msg: "Vector already running with PID: {{ vector_pid.stdout }}"
  when:
    - molecule_test | default(false)
    - vector_pid.stdout != ""

# Отладка (опционально)
- name: Debug - Show Vector process status
  shell: "ps aux | grep vector || true"
  register: vector_status
  changed_when: false
  when: molecule_test | default(false)

- name: Debug - Print Vector status
  debug:
    var: vector_status.stdout_lines
  when: molecule_test | default(false) and vector_status is defined
